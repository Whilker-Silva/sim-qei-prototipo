services:
  db:
    image: postgres:16-alpine
    container_name: simqei_db
    environment:
      POSTGRES_DB: simqei
      POSTGRES_USER: simqei
      POSTGRES_PASSWORD: simqei
    ports:
      - "5432:5432"
    volumes:
      - simqei_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simqei -d simqei"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: simqei_ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: 10m
      OLLAMA_NUM_PARALLEL: 1
    ports:
      - "11434:11434"
    volumes:
      - simqei_ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    container_name: simqei_ollama_pull
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      '
      echo "Aguardando servidor Ollama ficar disponível...";
      until ollama list >/dev/null 2>&1; do
        echo "Ollama ainda não está pronto. Tentando novamente em 3s...";
        sleep 3;
      done;

      echo "Verificando modelo: $$OLLAMA_MODEL";

      if ollama list | grep -q "$$OLLAMA_MODEL"; then
        echo "Modelo $$OLLAMA_MODEL já está baixado.";
      else
        echo "Baixando modelo $$OLLAMA_MODEL...";
        ollama pull $$OLLAMA_MODEL;
      fi;

      echo "Modelos disponíveis:";
      ollama list;

      echo "Ollama pronto para uso."
      '
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  backend:
    build: ./backend
    container_name: simqei_backend
    environment:
      DATABASE_URL: postgresql://simqei:simqei@db:5432/simqei
      CORS_ORIGINS: "*"

      # Por padrão usa LLM local via Ollama.
      # Para usar OpenAI, configure LLM_PROVIDER=openai e OPENAI_API_KEY no arquivo .env.
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-180}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    restart: unless-stopped

  edge-simulator:
    build: ./simulator
    container_name: simqei_edge_simulator
    environment:
      API_URL: http://backend:8000/api/telemetry
      HEALTH_URL: http://backend:8000/api/health
      SIM_INTERVAL_SECONDS: "2"
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: simqei_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  simqei_pgdata:
  simqei_ollama: