services:
  db:
    image: postgres:16-alpine
    container_name: simqei_db
    environment:
      POSTGRES_DB: simqei
      POSTGRES_USER: simqei
      POSTGRES_PASSWORD: simqei
    ports:
      - "5432:5432"
    volumes:
      - simqei_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simqei -d simqei"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: simqei_ollama
    ports:
      - "11434:11434"
    volumes:
      - simqei_ollama:/root/.ollama
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    container_name: simqei_ollama_pull
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
    entrypoint: ["/bin/sh", "-c"]
    command: "sleep 8 && ollama pull $$OLLAMA_MODEL || true"
    depends_on:
      - ollama
    restart: "no"

  backend:
    build: ./backend
    container_name: simqei_backend
    environment:
      DATABASE_URL: postgresql://simqei:simqei@db:5432/simqei
      CORS_ORIGINS: "*"
      # Por padrão usa LLM local via Ollama. Para usar OpenAI, configure LLM_PROVIDER=openai e OPENAI_API_KEY no arquivo .env.
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-180}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  edge-simulator:
    build: ./simulator
    container_name: simqei_edge_simulator
    environment:
      API_URL: http://backend:8000/api/telemetry
      HEALTH_URL: http://backend:8000/api/health
      SIM_INTERVAL_SECONDS: "2"
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: simqei_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  simqei_pgdata:
  simqei_ollama:
