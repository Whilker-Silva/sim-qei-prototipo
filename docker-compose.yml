services:
  db:
    image: postgres:16-alpine
    container_name: simqei_db
    environment:
      POSTGRES_DB: simqei
      POSTGRES_USER: simqei
      POSTGRES_PASSWORD: simqei
    ports:
      - "5432:5432"
    volumes:
      - simqei_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simqei -d simqei"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: simqei_backend
    environment:
      DATABASE_URL: postgresql://simqei:simqei@db:5432/simqei
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  edge-simulator:
    build: ./simulator
    container_name: simqei_edge_simulator
    environment:
      API_URL: http://backend:8000/api/telemetry
      HEALTH_URL: http://backend:8000/api/health
      SIM_INTERVAL_SECONDS: "2"
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: simqei_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  simqei_pgdata:
